<!DOCTYPE html>
<html>
<head>
<title>Flappy Ultimate Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    text-align: center;
    font-family: Arial;
    background: #87CEEB;
}

/* Welcome Screen */
#welcomeScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(#4facfe, #00f2fe);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

#startBtn {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    background: orange;
    color: white;
    border-radius: 8px;
}

/* Game */
canvas {
    display: block;
    margin: auto;
    background: #70c5ce;
    width: 90vw;
    max-width: 400px;
}

#restartBtn {
    display: none;
    padding: 10px;
    font-size: 16px;
}
</style>
</head>

<body>

<!-- WELCOME SCREEN -->
<div id="welcomeScreen">
    <h1>🐤 Flappy Game</h1>
    <p>Tap to Start</p>
    <button id="startBtn" onclick="startGame()">Start Game</button>
</div>

<h2>🎮 Game</h2>
<canvas id="gameCanvas"></canvas>
<br>
<button id="restartBtn" onclick="restartGame()">Restart</button>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

canvas.width = 360;
canvas.height = 500;

let bird, pipes, score, gameOver, frame;

// START GAME
function startGame() {
    document.getElementById("welcomeScreen").style.display = "none";
    init();
    loop();
}

function init() {
    bird = { x: 80, y: 200, size: 12, velocity: 0 };
    pipes = [];
    score = 0;
    gameOver = false;
    frame = 0;
}

function jump() {
    bird.velocity = -8;
}

document.addEventListener("keydown", e => {
    if (e.code === "Space") jump();
});
canvas.addEventListener("touchstart", jump);

// UPDATE
function update() {
    frame++;

    bird.velocity += 0.5;
    bird.y += bird.velocity;

    if (frame % 90 === 0) {
        let gap = 140;
        let top = Math.random() * (canvas.height - gap - 80) + 40;

        pipes.push({
            x: canvas.width,
            width: 50,
            top: top,
            bottom: top + gap,
            passed: false
        });
    }

    pipes.forEach(pipe => {
        pipe.x -= 2;

        if (
            bird.x + bird.size > pipe.x &&
            bird.x - bird.size < pipe.x + pipe.width &&
            (bird.y - bird.size < pipe.top || bird.y + bird.size > pipe.bottom)
        ) {
            gameOver = true;
        }

        if (!pipe.passed && pipe.x + pipe.width < bird.x) {
            score++;
            pipe.passed = true;
        }
    });

    pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);

    if (bird.y > canvas.height || bird.y < 0) {
        gameOver = true;
    }
}

// DRAW
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.size, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "green";
    pipes.forEach(pipe => {
        ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
        ctx.fillRect(pipe.x, pipe.bottom, pipe.width, canvas.height);
    });

    ctx.fillStyle = "black";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 10, 30);

    if (gameOver) {
        ctx.fillStyle = "red";
        ctx.font = "30px Arial";
        ctx.fillText("GAME OVER", 80, 250);
        document.getElementById("restartBtn").style.display = "inline";
    }
}

// LOOP
function loop() {
    update();
    draw();

    if (!gameOver) {
        requestAnimationFrame(loop);
    }
}

// RESTART
function restartGame() {
    document.getElementById("restartBtn").style.display = "none";
    init();
    loop();
}
</script>

</body>
</html>
