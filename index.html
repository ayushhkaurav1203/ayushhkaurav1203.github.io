<!DOCTYPE html>
<html>
<head>
<title>Flappy Ayushh Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    text-align: center;
    font-family: Arial;
    background: #87CEEB;
}

/* WELCOME SCREEN */
#welcomeScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    animation: fadeIn 1.5s ease-in-out;
}

.title {
    font-size: 28px;
    color: white;
    animation: slideDown 1.5s ease;
}

.subtitle {
    color: yellow;
    animation: fadeIn 2s ease;
}

.hindi {
    font-size: 20px;
    color: white;
    margin: 10px 0;
    animation: fadeIn 3s ease;
}

#startBtn {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    background: orange;
    color: white;
    border-radius: 8px;
    animation: pulse 1.5s infinite;
}

/* GAME */
canvas {
    display: block;
    margin: auto;
    background: #70c5ce;
    width: 90vw;
    max-width: 400px;
}

#restartBtn {
    display: none;
    padding: 10px;
    font-size: 16px;
}

/* ANIMATIONS */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes slideDown {
    from {transform: translateY(-50px); opacity: 0;}
    to {transform: translateY(0); opacity: 1;}
}

@keyframes pulse {
    0% {transform: scale(1);}
    50% {transform: scale(1.1);}
    100% {transform: scale(1);}
}
</style>
</head>

<body>

<!-- 🔊 SOUND -->
<audio id="jumpSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="hitSound" src="https://www.soundjay.com/button/sounds/button-10.mp3"></audio>

<!-- WELCOME SCREEN -->
<div id="welcomeScreen">
    <h1 class="title">Welcome to Ayushh Kaurav</h1>
    <h2 class="subtitle">1st Testing Game</h2>
    <p class="hindi">आपका स्वागत है 🙏</p>
    <button id="startBtn" onclick="startGame()">Start Game</button>
</div>

<h2>🎮 Game</h2>
<canvas id="gameCanvas"></canvas>
<br>
<button id="restartBtn" onclick="restartGame()">Restart</button>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

// 🐤 WORKING BIRD IMAGE
let birdImg = new Image();
birdImg.src = "https://upload.wikimedia.org/wikipedia/commons/0/0f/Yellow_bird_cartoon.png";

canvas.width = 360;
canvas.height = 500;

let bird, pipes, score, gameOver, frame;

function startGame() {
    document.getElementById("welcomeScreen").style.display = "none";
    init();
    loop();
}

function init() {
    bird = { x: 80, y: 200, size: 12, velocity: 0 };
    pipes = [];
    score = 0;
    gameOver = false;
    frame = 0;
}

function jump() {
    bird.velocity = -8;

    let sound = document.getElementById("jumpSound");
    sound.currentTime = 0;
    sound.play();
}

document.addEventListener("keydown", e => {
    if (e.code === "Space") jump();
});
canvas.addEventListener("touchstart", jump);

function update() {
    frame++;

    bird.velocity += 0.5;
    bird.y += bird.velocity;

    if (frame % 90 === 0) {
        let gap = 140;
        let top = Math.random() * (canvas.height - gap - 80) + 40;

        pipes.push({
            x: canvas.width,
            width: 50,
            top: top,
            bottom: top + gap,
            passed: false
        });
    }

    pipes.forEach(pipe => {
        pipe.x -= 2;

        if (
            bird.x + 15 > pipe.x &&
            bird.x - 15 < pipe.x + pipe.width &&
            (bird.y - 15 < pipe.top || bird.y + 15 > pipe.bottom)
        ) {
            if (!gameOver) {
                let hit = document.getElementById("hitSound");
                hit.currentTime = 0;
                hit.play();
            }
            gameOver = true;
        }

        if (!pipe.passed && pipe.x + pipe.width < bird.x) {
            score++;
            pipe.passed = true;
        }
    });

    pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);

    if (bird.y > canvas.height || bird.y < 0) {
        if (!gameOver) {
            let hit = document.getElementById("hitSound");
            hit.currentTime = 0;
            hit.play();
        }
        gameOver = true;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 🐤 DRAW IMAGE (FIXED)
    ctx.drawImage(birdImg, bird.x - 15, bird.y - 15, 30, 30);

    // pipes
    ctx.fillStyle = "green";
    pipes.forEach(pipe => {
        ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
        ctx.fillRect(pipe.x, pipe.bottom, pipe.width, canvas.height);
    });

    // score
    ctx.fillStyle = "black";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 10, 30);

    if (gameOver) {
        ctx.fillStyle = "red";
        ctx.font = "30px Arial";
        ctx.fillText("GAME OVER", 80, 250);
        document.getElementById("restartBtn").style.display = "inline";
    }
}

function loop() {
    update();
    draw();

    if (!gameOver) {
        requestAnimationFrame(loop);
    }
}

function restartGame() {
    document.getElementById("restartBtn").style.display = "none";
    init();
    loop();
}
</script>

</body>
</html>
