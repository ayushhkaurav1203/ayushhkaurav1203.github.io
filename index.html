<!DOCTYPE html>
<html>
<head>
<title>Flappy Ayushh Game FINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    text-align: center;
    font-family: Arial;
    background: #87CEEB;
}

/* WELCOME */
#welcomeScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(#4facfe,#00f2fe);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#startBtn {
    padding: 12px 25px;
    font-size: 18px;
    background: orange;
    color: white;
    border: none;
}

canvas {
    display: block;
    margin: auto;
    background: #70c5ce;
    width: 90vw;
    max-width: 400px;
}

#restartBtn {
    display: none;
    padding: 10px;
}
</style>
</head>

<body>

<!-- SOUND -->
<audio id="jumpSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>
<audio id="hitSound" src="https://www.soundjay.com/button/sounds/button-10.mp3" preload="auto"></audio>

<!-- WELCOME -->
<div id="welcomeScreen">
    <h1>Welcome to Ayushh Kaurav</h1>
    <p>1st Testing Game</p>
    <p>आपका स्वागत है 🙏</p>
    <button id="startBtn">Start Game</button>
</div>

<h2>🎮 Game</h2>
<canvas id="gameCanvas"></canvas>
<br>
<button id="restartBtn" onclick="restartGame()">Restart</button>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

canvas.width = 360;
canvas.height = 500;

// 🐤 LOCAL IMAGE (100% WORKING)
let birdImg = new Image();
birdImg.src = "bird.png";

let bird, pipes, score, gameOver, frame;

// START BUTTON
document.getElementById("startBtn").onclick = () => {
    document.getElementById("welcomeScreen").style.display = "none";
    init();
    loop();
};

function init(){
    bird = {x:80,y:200,v:0};
    pipes=[];
    score=0;
    gameOver=false;
    frame=0;
}

function jump(){
    bird.v = -8;

    let s = document.getElementById("jumpSound");
    s.currentTime = 0;
    s.play().catch(()=>{});
}

document.addEventListener("keydown",e=>{
    if(e.code==="Space") jump();
});
canvas.addEventListener("touchstart",jump);

function update(){
    frame++;

    bird.v += 0.5;
    bird.y += bird.v;

    if(frame % 90 === 0){
        let gap = 140;
        let top = Math.random()*(canvas.height-gap-80)+40;

        pipes.push({
            x:canvas.width,
            w:50,
            top:top,
            bottom:top+gap,
            passed:false
        });
    }

    pipes.forEach(p=>{
        p.x -= 2;

        if(
            bird.x+15 > p.x &&
            bird.x-15 < p.x+p.w &&
            (bird.y-15 < p.top || bird.y+15 > p.bottom)
        ){
            if(!gameOver){
                let h = document.getElementById("hitSound");
                h.currentTime = 0;
                h.play().catch(()=>{});
            }
            gameOver = true;
        }

        if(!p.passed && p.x+p.w < bird.x){
            score++;
            p.passed = true;
        }
    });

    pipes = pipes.filter(p=>p.x+p.w>0);

    if(bird.y > canvas.height || bird.y < 0){
        gameOver = true;
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // 🐤 DRAW IMAGE (fallback safe)
    if(birdImg.complete){
        ctx.drawImage(birdImg,bird.x-15,bird.y-15,30,30);
    } else {
        ctx.fillStyle="yellow";
        ctx.beginPath();
        ctx.arc(bird.x,bird.y,12,0,Math.PI*2);
        ctx.fill();
    }

    ctx.fillStyle="green";
    pipes.forEach(p=>{
        ctx.fillRect(p.x,0,p.w,p.top);
        ctx.fillRect(p.x,p.bottom,p.w,canvas.height);
    });

    ctx.fillStyle="black";
    ctx.font="20px Arial";
    ctx.fillText("Score: "+score,10,30);

    if(gameOver){
        ctx.fillStyle="red";
        ctx.font="30px Arial";
        ctx.fillText("GAME OVER",80,250);
        document.getElementById("restartBtn").style.display="inline";
    }
}

function loop(){
    update();
    draw();
    if(!gameOver) requestAnimationFrame(loop);
}

function restartGame(){
    document.getElementById("restartBtn").style.display="none";
    init();
    loop();
}
</script>

</body>
</html>
