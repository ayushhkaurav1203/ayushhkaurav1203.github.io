<!DOCTYPE html>
<html>
<head>
<title>Pro Flappy Game</title>
<style>
body {
    text-align: center;
    font-family: Arial;
}
canvas {
    background: linear-gradient(skyblue, white);
    display: block;
    margin: auto;
}
#restartBtn {
    display: none;
    padding: 10px 20px;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>🔥 Pro Flappy Bird</h1>
<p>Press SPACE or TAP to jump</p>

<canvas id="gameCanvas" width="350" height="500"></canvas>
<br>
<button id="restartBtn" onclick="restartGame()">Restart</button>

<audio id="jumpSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="hitSound" src="https://www.soundjay.com/button/sounds/button-10.mp3"></audio>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

let bird, pipes, score, gameOver, speed;

function init() {
    bird = { x: 80, y: 200, w: 25, h: 25, gravity: 0.6, lift: -10, velocity: 0 };
    pipes = [];
    score = 0;
    gameOver = false;
    speed = 2;
}

function jump() {
    bird.velocity = bird.lift;
    document.getElementById("jumpSound").play();
}

document.addEventListener("keydown", e => {
    if (e.code === "Space") jump();
});

// Mobile touch
canvas.addEventListener("touchstart", jump);

function drawBird() {
    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, 12, 0, Math.PI * 2);
    ctx.fill();
}

function drawPipes() {
    ctx.fillStyle = "green";
    pipes.forEach(pipe => {
        ctx.fillRect(pipe.x, 0, 50, pipe.top);
        ctx.fillRect(pipe.x, pipe.bottom, 50, canvas.height);
    });
}

function updatePipes() {
    if (Math.random() < 0.02) {
        let top = Math.random() * 250;
        let gap = 120;
        pipes.push({
            x: canvas.width,
            top: top,
            bottom: top + gap,
            passed: false
        });
    }

    pipes.forEach(pipe => {
        pipe.x -= speed;

        // collision
        if (
            bird.x < pipe.x + 50 &&
            bird.x + bird.w > pipe.x &&
            (bird.y < pipe.top || bird.y > pipe.bottom)
        ) {
            gameOver = true;
            document.getElementById("hitSound").play();
        }

        // score
        if (!pipe.passed && pipe.x < bird.x) {
            score++;
            pipe.passed = true;

            // difficulty increase
            if (score % 5 === 0) speed += 0.5;
        }
    });
}

function updateBird() {
    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    if (bird.y > canvas.height || bird.y < 0) {
        gameOver = true;
        document.getElementById("hitSound").play();
    }
}

function drawScore() {
    ctx.fillStyle = "black";
    ctx.font = "22px Arial";
    ctx.fillText("Score: " + score, 10, 30);
}

function drawGameOver() {
    ctx.fillStyle = "red";
    ctx.font = "40px Arial";
    ctx.fillText("GAME OVER", 60, 250);
    document.getElementById("restartBtn").style.display = "inline";
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawBird();
    drawPipes();
    drawScore();

    if (!gameOver) {
        updateBird();
        updatePipes();
        requestAnimationFrame(loop);
    } else {
        drawGameOver();
    }
}

function restartGame() {
    document.getElementById("restartBtn").style.display = "none";
    init();
    loop();
}

init();
loop();
</script>

</body>
</html>
