<!DOCTYPE html>
<html>
<head>
<title>Ayushh Kaurav</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* WELCOME SCREEN */
#welcome {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    animation: fadeIn 2s;
}

#welcome h1 {
    color: gold;
    animation: zoom 2s;
}

#welcome p {
    animation: fadeIn 3s;
}

/* MAIN SITE */
#main {
    display: none;
    padding: 15px;
    background: #f6f6f6;
}

/* ANIMATIONS */
@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

@keyframes zoom {
    from {transform: scale(0.5);}
    to {transform: scale(1);}
}

/* BOX */
.box {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

.button {
    display: block;
    padding: 10px;
    background: #e1306c;
    color: white;
    text-decoration: none;
    text-align: center;
}

</style>

<script>
setTimeout(function(){
    document.getElementById("welcome").style.display = "none";
    document.getElementById("main").style.display = "block";
}, 3000); // 3 seconds baad website open hogi
</script>

</head>

<body>

<!-- WELCOME SCREEN -->
<div id="welcome">
    <h1>Welcome to Ayushh Kaurav Website</h1>
    <p>Apka Swagat Hai 🙏</p>
</div>

<!-- MAIN WEBSITE -->
<div id="main">

<div class="box">
<h2>Ayushh Kaurav</h2>
<p>Future IPS Officer</p>
</div>

<div class="box">
<h3>About</h3>
<p>Ayushh Kaurav is a student from Gwalior, India.</p>
</div>

<div class="box">
<img src="photo.jpg" width="100%">
<a href="https://www.instagram.com/ayushh_kaurav" target="_blank" class="button">
Instagram
</a>
</div>

</div>

</body>
</html>
