<!DOCTYPE html>
<html>
<head>
<title>Flappy Pro Fixed</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    text-align: center;
    font-family: Arial;
    margin: 0;
    background: #e0f7ff;
}

h1 {
    font-size: 22px;
}

canvas {
    background: skyblue;
    display: block;
    margin: auto;
    width: 100%;
    max-width: 400px;
    height: auto;
}

#restartBtn {
    display: none;
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>🐤 Flappy Pro (Fixed)</h1>
<p>Tap / SPACE to jump</p>

<canvas id="gameCanvas"></canvas>
<br>
<button id="restartBtn" onclick="restartGame()">Restart</button>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

// Responsive size
function resizeCanvas() {
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let bird, pipes, score, gameOver, speed;

function init() {
    bird = { x: 60, y: 150, size: 15, gravity: 0.5, lift: -8, velocity: 0 };
    pipes = [];
    score = 0;
    gameOver = false;
    speed = 2;
}

// Controls
function jump() {
    bird.velocity = bird.lift;
}

document.addEventListener("keydown", e => {
    if (e.code === "Space") jump();
});
canvas.addEventListener("touchstart", jump);

// Draw Bird
function drawBird() {
    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.size, 0, Math.PI * 2);
    ctx.fill();
}

// Draw Pipes (WITH PROPER GAP)
function drawPipes() {
    ctx.fillStyle = "green";
    pipes.forEach(pipe => {
        ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
        ctx.fillRect(pipe.x, pipe.bottom, pipe.width, canvas.height);
    });
}

// Update Pipes (FIXED GAP LOGIC)
function updatePipes() {
    if (Math.random() < 0.02) {
        let gap = 120; // gap size (important)
        let top = Math.random() * (canvas.height - gap - 100) + 50;

        pipes.push({
            x: canvas.width,
            width: 50,
            top: top,
            bottom: top + gap,
            passed: false
        });
    }

    pipes.forEach(pipe => {
        pipe.x -= speed;

        // COLLISION (FIXED)
        if (
            bird.x + bird.size > pipe.x &&
            bird.x - bird.size < pipe.x + pipe.width &&
            (bird.y - bird.size < pipe.top || bird.y + bird.size > pipe.bottom)
        ) {
            gameOver = true;
        }

        // SCORE
        if (!pipe.passed && pipe.x + pipe.width < bird.x) {
            score++;
            pipe.passed = true;

            if (score % 5 === 0) speed += 0.3;
        }
    });

    // Remove off-screen pipes
    pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);
}

// Update Bird
function updateBird() {
    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    if (bird.y > canvas.height || bird.y < 0) {
        gameOver = true;
    }
}

// Score
function drawScore() {
    ctx.fillStyle = "black";
    ctx.font = "18px Arial";
    ctx.fillText("Score: " + score, 10, 25);
}

// Game Over
function drawGameOver() {
    ctx.fillStyle = "red";
    ctx.font = "30px Arial";
    ctx.fillText("GAME OVER", canvas.width/4, canvas.height/2);
    document.getElementById("restartBtn").style.display = "inline";
}

// Loop
function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawBird();
    drawPipes();
    drawScore();

    if (!gameOver) {
        updateBird();
        updatePipes();
        requestAnimationFrame(loop);
    } else {
        drawGameOver();
    }
}

// Restart
function restartGame() {
    document.getElementById("restartBtn").style.display = "none";
    init();
    loop();
}

init();
loop();
</script>

</body>
</html>
