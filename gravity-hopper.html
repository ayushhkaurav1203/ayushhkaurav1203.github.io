<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Gravity Hopper</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080b14;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;overflow:hidden}
#wrap{position:relative}
canvas{display:block;border:1px solid rgba(236,204,104,0.3);border-radius:4px;box-shadow:0 0 30px rgba(236,204,104,0.15)}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,11,20,0.92);border-radius:4px;text-align:center;padding:20px}
#overlay h2{font-size:1.8rem;font-weight:900;letter-spacing:3px;color:#eccc68;text-shadow:0 0 20px rgba(236,204,104,0.5);text-transform:uppercase;margin-bottom:8px}
#overlay p{color:#8899aa;margin-bottom:6px;font-size:0.85rem}
#overlay .info{color:#eccc68;font-size:0.9rem;margin:4px 0}
#startBtn{margin-top:14px;padding:12px 30px;background:#eccc68;color:#080b14;border:none;border-radius:8px;font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:0.2s}
#startBtn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(236,204,104,0.5)}
.mb-controls{display:flex;gap:10px;margin-top:10px}
.mb-btn{padding:12px 20px;background:#1e2d40;border:2px solid #eccc68;color:#eccc68;border-radius:8px;font-size:0.9rem;font-weight:700;cursor:pointer;touch-action:manipulation}
.mb-btn:active{background:#eccc68;color:#080b14}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c"></canvas>
<div id="overlay">
  <h2 id="oTitle">Gravity Hopper</h2>
  <p id="oMsg">Flip gravity to survive!</p>
  <p class="info" id="oMsg2">← → / A D : Move &nbsp;|&nbsp; Space / W : Jump</p>
  <p class="info" id="oMsg3">↑ / F : Flip Gravity!</p>
  <p id="oScore" style="font-size:1.5rem;color:#ffe600;font-weight:700;margin-top:8px;display:none"></p>
  <button id="startBtn">▶ Start</button>
</div>
</div>
<div class="mb-controls" id="mbControls" style="display:none">
  <button class="mb-btn" id="mbLeft">◄</button>
  <button class="mb-btn" id="mbJump">JUMP</button>
  <button class="mb-btn" id="mbFlip">FLIP ↕</button>
  <button class="mb-btn" id="mbRight">►</button>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=canvas.width=520,H=canvas.height=400;
const overlay=document.getElementById('overlay');
const startBtn=document.getElementById('startBtn');
const oTitle=document.getElementById('oTitle');
const oMsg=document.getElementById('oMsg');
const oMsg2=document.getElementById('oMsg2');
const oMsg3=document.getElementById('oMsg3');
const oScoreEl=document.getElementById('oScore');
const mbControls=document.getElementById('mbControls');

if('ontouchstart' in window) mbControls.style.display='flex';

let gameRunning=false,animId,frame=0,level=1,starsCollected=0;
const GRAVITY=0.5;
const JUMP_FORCE=-11;

let gravDir=1; // 1=down, -1=up
let p={x:60,y:200,w:24,h:32,vx:0,vy:0,onGround:false};

// Level definitions: platforms and stars
const LEVELS=[
  // Level 1
  {platforms:[
    {x:0,y:360,w:520,h:20,color:'#1a2540'},   // floor
    {x:0,y:20,w:520,h:20,color:'#1a2540'},    // ceiling
    {x:180,y:260,w:100,h:16,color:'#2a3a5a'},
    {x:320,y:180,w:120,h:16,color:'#2a3a5a'},
  ],stars:[
    {x:230,y:230,r:10},{x:370,y:150,r:10},{x:440,y:240,r:10},
  ]},
  // Level 2
  {platforms:[
    {x:0,y:380,w:520,h:20,color:'#1a2540'},
    {x:0,y:0,w:520,h:20,color:'#1a2540'},
    {x:100,y:280,w:80,h:14,color:'#2a3a5a'},
    {x:240,y:200,w:80,h:14,color:'#2a3a5a'},
    {x:360,y:290,w:80,h:14,color:'#2a3a5a'},
    {x:130,y:130,w:80,h:14,color:'#2a3a5a'},
    {x:300,y:110,w:90,h:14,color:'#2a3a5a'},
  ],stars:[
    {x:140,y:250,r:10},{x:280,y:170,r:10},{x:400,y:260,r:10},
    {x:170,y:100,r:10},{x:345,y:80,r:10},
  ]},
  // Level 3
  {platforms:[
    {x:0,y:380,w:180,h:20,color:'#1a2540'},
    {x:0,y:0,w:520,h:20,color:'#1a2540'},
    {x:340,y:380,w:180,h:20,color:'#1a2540'},
    {x:80,y:300,w:70,h:14,color:'#2a3a5a'},
    {x:200,y:250,w:70,h:14,color:'#2a3a5a'},
    {x:310,y:300,w:70,h:14,color:'#2a3a5a'},
    {x:80,y:160,w:70,h:14,color:'#2a3a5a'},
    {x:200,y:100,w:70,h:14,color:'#2a3a5a'},
    {x:340,y:160,w:80,h:14,color:'#2a3a5a'},
    {x:440,y:260,w:60,h:14,color:'#2a3a5a'},
  ],stars:[
    {x:115,y:270,r:10},{x:235,y:220,r:10},{x:345,y:270,r:10},
    {x:115,y:130,r:10},{x:235,y:70,r:10},{x:380,y:130,r:10},{x:470,y:230,r:10},
  ]},
];

let currentLevel=null,lStars=[];
function loadLevel(n){
  const def=LEVELS[Math.min(n-1,LEVELS.length-1)];
  currentLevel=JSON.parse(JSON.stringify(def));
  lStars=currentLevel.stars.map(s=>({...s,collected:false}));
  starsCollected=0;
  gravDir=1;
  p.x=60;p.y=200;p.vx=0;p.vy=0;
}

const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.code==='Space'||e.key==='w'||e.key==='W') e.preventDefault();
  if(e.key==='ArrowUp'||e.key==='f'||e.key==='F'){e.preventDefault();flipGravity();}
});
document.addEventListener('keyup',e=>keys[e.key]=false);

// Mobile
document.getElementById('mbLeft').addEventListener('touchstart',e=>{e.preventDefault();keys['ArrowLeft']=true});
document.getElementById('mbLeft').addEventListener('touchend',()=>keys['ArrowLeft']=false);
document.getElementById('mbRight').addEventListener('touchstart',e=>{e.preventDefault();keys['ArrowRight']=true});
document.getElementById('mbRight').addEventListener('touchend',()=>keys['ArrowRight']=false);
document.getElementById('mbJump').addEventListener('touchstart',e=>{e.preventDefault();doJump();});
document.getElementById('mbFlip').addEventListener('touchstart',e=>{e.preventDefault();flipGravity();});

let lastFlip=0;
function flipGravity(){
  if(!gameRunning) return;
  const now=Date.now();
  if(now-lastFlip<300) return;
  lastFlip=now;
  gravDir*=-1;p.vy*=-0.5;
  // Flip effect
  ctx.fillStyle='rgba(236,204,104,0.1)';ctx.fillRect(0,0,W,H);
}

let canJump=false;
function doJump(){
  if(p.onGround){p.vy=JUMP_FORCE*gravDir;p.onGround=false;}
}

function update(){
  frame++;
  // Input
  if(keys['ArrowLeft']||keys['a']||keys['A']) p.vx=-3.5;
  else if(keys['ArrowRight']||keys['d']||keys['D']) p.vx=3.5;
  else p.vx*=0.8;

  if((keys[' ']||keys['w']||keys['W'])&&p.onGround) doJump();

  // Physics
  p.vy+=GRAVITY*gravDir;
  p.vy=Math.max(Math.min(p.vy,14),-14);
  p.x+=p.vx;p.y+=p.vy;
  p.onGround=false;

  // Clamp x
  p.x=Math.max(0,Math.min(W-p.w,p.x));

  // Collision with platforms
  currentLevel.platforms.forEach(pl=>{
    if(p.x+p.w>pl.x && p.x<pl.x+pl.w){
      if(gravDir===1){
        if(p.y+p.h>=pl.y && p.y+p.h<=pl.y+pl.h+Math.abs(p.vy)+2 && p.vy>=0){
          p.y=pl.y-p.h;p.vy=0;p.onGround=true;
        }
        if(p.y<=pl.y+pl.h && p.y>=pl.y-Math.abs(p.vy)-2 && p.vy<0){
          p.y=pl.y+pl.h;p.vy=0;
        }
      } else {
        if(p.y<=pl.y+pl.h && p.y>=pl.y-Math.abs(p.vy)-2 && p.vy<=0){
          p.y=pl.y+pl.h;p.vy=0;p.onGround=true;
        }
        if(p.y+p.h>=pl.y && p.y+p.h<=pl.y+pl.h+Math.abs(p.vy)+2 && p.vy>0){
          p.y=pl.y-p.h;p.vy=0;
        }
      }
    }
  });

  // Star collection
  lStars.forEach(s=>{
    if(s.collected) return;
    if(Math.abs(p.x+p.w/2-s.x)<s.r+12 && Math.abs(p.y+p.h/2-s.y)<s.r+12){
      s.collected=true;starsCollected++;
    }
  });

  // Level complete
  if(starsCollected>=lStars.length){
    level++;
    if(level>LEVELS.length){
      // Victory
      endGame(true);return;
    }
    loadLevel(level);
  }

  // Out of bounds death
  if(p.y>H+50||p.y<-100) endGame(false);
}

function draw(){
  // BG
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#050810');bg.addColorStop(1,'#0a1020');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(236,204,104,0.04)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=32){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Gravity indicator
  const gi=gravDir===1?'▼':'▲';
  ctx.fillStyle='rgba(236,204,104,0.4)';ctx.font='bold 12px monospace';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('GRAVITY '+gi,10,50);

  // Level / stars HUD
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,0,W,36);
  ctx.fillStyle='rgba(236,204,104,0.3)';ctx.fillRect(0,34,W,2);
  ctx.fillStyle='#eccc68';ctx.font='bold 13px monospace';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('LEVEL '+level+' / '+LEVELS.length,10,18);
  ctx.fillStyle='#ffe600';ctx.textAlign='center';
  ctx.fillText('⭐ '+starsCollected+' / '+lStars.length,W/2,18);
  ctx.fillStyle='#8899aa';ctx.textAlign='right';
  ctx.fillText('SPACE=Jump  F=Flip',W-10,18);

  // Platforms
  currentLevel.platforms.forEach(pl=>{
    ctx.fillStyle=pl.color;
    ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
    ctx.fillStyle='rgba(236,204,104,0.3)';
    ctx.fillRect(pl.x,gravDir===1?pl.y:pl.y+pl.h-2,pl.w,2);
  });

  // Stars
  lStars.forEach((s,i)=>{
    if(s.collected) return;
    const bob=Math.sin(frame*0.05+i*1.2)*5;
    ctx.save();ctx.translate(s.x,s.y+bob);
    ctx.rotate(frame*0.02);
    // Star shape
    ctx.beginPath();
    for(let k=0;k<5;k++){
      const a=k*Math.PI*2/5-Math.PI/2;
      const ai=a+Math.PI/5;
      if(k===0) ctx.moveTo(Math.cos(a)*s.r,Math.sin(a)*s.r);
      else ctx.lineTo(Math.cos(a)*s.r,Math.sin(a)*s.r);
      ctx.lineTo(Math.cos(ai)*(s.r*0.4),Math.sin(ai)*(s.r*0.4));
    }
    ctx.closePath();
    ctx.fillStyle='#ffe600';ctx.shadowColor='#ffe600';ctx.shadowBlur=15;ctx.fill();
    ctx.restore();
  });
  ctx.shadowBlur=0;

  // Player
  const px=Math.round(p.x),py=Math.round(p.y);
  const flip=gravDir===-1;
  ctx.save();
  if(flip){ctx.translate(px+p.w/2,py+p.h/2);ctx.scale(1,-1);ctx.translate(-p.w/2,-p.h/2);}
  else ctx.translate(px,py);
  // Body
  ctx.fillStyle='#eccc68';ctx.shadowColor='#eccc68';ctx.shadowBlur=15;
  ctx.fillRect(4,8,p.w-8,p.h-8);
  // Head
  ctx.fillStyle='#f7dc6f';
  ctx.fillRect(4,0,p.w-8,10);
  // Eyes
  ctx.fillStyle='#080b14';ctx.fillRect(6,2,5,4);ctx.fillRect(p.w-12,2,5,4);
  ctx.fillStyle='#fff';ctx.fillRect(7,3,2,2);ctx.fillRect(p.w-11,3,2,2);
  // Boots
  ctx.fillStyle='#b7950b';
  ctx.fillRect(4,p.h-8,10,8);ctx.fillRect(p.w-14,p.h-8,10,8);
  ctx.shadowBlur=0;
  ctx.restore();

  // Gravity flip trail
  if(Math.abs(p.vy)>8){
    ctx.fillStyle=`rgba(236,204,104,${Math.abs(p.vy)/20})`;
    ctx.fillRect(p.x+4,p.y+(p.vy>0?p.h:-8),p.w-8,8);
  }
}

function loop(){
  if(!gameRunning) return;
  update();draw();
  animId=requestAnimationFrame(loop);
}

function startGame(){
  level=1;loadLevel(level);
  overlay.style.display='none';
  gameRunning=true;
  loop();
}

function endGame(win){
  gameRunning=false;cancelAnimationFrame(animId);
  if(win){oTitle.textContent='You Won! 🎉';oMsg.textContent='All levels cleared!';oMsg2.textContent='';}
  else{oTitle.textContent='You Fell!';oMsg.textContent='Watch the gravity direction!';}
  oMsg3.textContent='';
  oScoreEl.style.display='block';
  oScoreEl.textContent=win?'Legendary!':'Level '+level+' reached';
  startBtn.textContent='▶ Try Again';
  overlay.style.display='flex';
}

startBtn.addEventListener('click',startGame);
</script>
</body>
</html>
