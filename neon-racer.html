<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Neon Racer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080b14;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;overflow:hidden}
canvas{display:block;border:1px solid rgba(255,165,2,0.3);border-radius:4px;box-shadow:0 0 30px rgba(255,165,2,0.2)}
#ui{position:absolute;top:0;left:50%;transform:translateX(-50%);width:min(480px,100vw);padding:8px 16px;display:flex;justify-content:space-between;pointer-events:none}
.stat{color:#ffa502;font-size:0.9rem;font-weight:700;letter-spacing:1px;text-shadow:0 0 8px rgba(255,165,2,0.5)}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,11,20,0.9);border-radius:4px}
#overlay h2{font-size:1.8rem;font-weight:900;letter-spacing:3px;color:#ffa502;text-shadow:0 0 20px rgba(255,165,2,0.5);text-transform:uppercase;margin-bottom:8px}
#overlay p{color:#8899aa;margin-bottom:6px;font-size:0.85rem}
#overlay .score{font-size:2rem;color:#00f5ff;font-weight:700;margin:10px 0}
#startBtn{padding:12px 30px;background:#ffa502;color:#080b14;border:none;border-radius:8px;font-size:0.95rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:0.2s}
#startBtn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(255,165,2,0.5)}
.mobile-controls{display:flex;gap:16px;margin-top:12px}
.mb-btn{padding:14px 28px;background:#1e2d40;border:2px solid #ffa502;color:#ffa502;border-radius:8px;font-size:1.2rem;font-weight:700;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation}
.mb-btn:active{background:#ffa502;color:#080b14}
</style>
</head>
<body>
<div style="position:relative">
  <canvas id="c"></canvas>
  <div id="ui">
    <span class="stat">SCORE: <span id="scoreEl">0</span></span>
    <span class="stat">SPEED: <span id="speedEl">0</span> km/h</span>
    <span class="stat">LIVES: <span id="livesEl">❤❤❤</span></span>
  </div>
  <div id="overlay">
    <h2 id="oTitle">Neon Racer</h2>
    <p id="oMsg">Dodge traffic, collect boosts!</p>
    <p id="oMsg2" style="color:#ffa502;font-size:0.9rem">← → or A D to steer</p>
    <div class="score" id="oScore" style="display:none"></div>
    <button id="startBtn">▶ Start Race</button>
  </div>
</div>
<div class="mobile-controls" id="mobileControls" style="display:none">
  <button class="mb-btn" id="leftBtn">◄</button>
  <button class="mb-btn" id="rightBtn">►</button>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=canvas.width=480, H=canvas.height=640;
const ui={score:document.getElementById('scoreEl'),speed:document.getElementById('speedEl'),lives:document.getElementById('livesEl')};
const overlay=document.getElementById('overlay');
const startBtn=document.getElementById('startBtn');
const oTitle=document.getElementById('oTitle');
const oMsg=document.getElementById('oMsg');
const oMsg2=document.getElementById('oMsg2');
const oScore=document.getElementById('oScore');
const mobileControls=document.getElementById('mobileControls');

// Show mobile controls on touch devices
if('ontouchstart' in window) mobileControls.style.display='flex';

let gameRunning=false, animId;
const LANE_COUNT=5;
const LANE_W=W/LANE_COUNT;
const LANES=[...Array(LANE_COUNT)].map((_,i)=>LANE_W/2+i*LANE_W);

// Player
let player={x:W/2,y:H-120,w:36,h:60,lane:2,speed:0,invincible:0};
let score=0,baseSpeed=4,spd=4,lives=3,frame=0;

// Road lines
let lines=[];
for(let i=0;i<20;i++) lines.push({y:i*(H/10)-H});

// Traffic
let cars=[];
// Boosts (nitro)
let boosts=[];

const CAR_COLORS=['#ff4757','#2ed573','#a855f7','#ff6348','#1e90ff','#ffa502'];

function spawnCar(){
  const lane=Math.floor(Math.random()*LANE_COUNT);
  // Don't spawn on player lane at top
  const color=CAR_COLORS[Math.floor(Math.random()*CAR_COLORS.length)];
  cars.push({x:LANES[lane],y:-80,w:34,h:58,color,lane,speed:spd*0.6+Math.random()*spd*0.4});
}

function spawnBoost(){
  const lane=Math.floor(Math.random()*LANE_COUNT);
  boosts.push({x:LANES[lane],y:-30,r:14});
}

function drawRoad(){
  // Road bg
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0a0f1e');
  grad.addColorStop(1,'#050810');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);
  // Lane dividers
  ctx.strokeStyle='rgba(255,165,2,0.15)';
  ctx.lineWidth=1;
  ctx.setLineDash([30,20]);
  for(let i=1;i<LANE_COUNT;i++){
    ctx.beginPath();ctx.moveTo(i*LANE_W,0);ctx.lineTo(i*LANE_W,H);ctx.stroke();
  }
  ctx.setLineDash([]);
  // Edge lines
  ctx.strokeStyle='rgba(255,165,2,0.4)';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(2,0);ctx.lineTo(2,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W-2,0);ctx.lineTo(W-2,H);ctx.stroke();
  // Moving centre dashes
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=2;ctx.setLineDash([40,30]);
  lines.forEach(l=>{
    ctx.beginPath();ctx.moveTo(W/2,l.y);ctx.lineTo(W/2,l.y+40);ctx.stroke();
  });
  ctx.setLineDash([]);
}

function drawCar(car,isPlayer){
  ctx.save();
  ctx.translate(car.x,car.y);
  if(isPlayer && player.invincible>0 && Math.floor(frame/4)%2===0){ctx.globalAlpha=0.4;}
  // Body
  const col=isPlayer?'#00f5ff':car.color;
  ctx.fillStyle=col;
  ctx.shadowColor=col;ctx.shadowBlur=isPlayer?20:10;
  // Car body shape
  ctx.beginPath();
  ctx.roundRect(-car.w/2,-car.h/2,car.w,car.h,6);
  ctx.fill();
  // Windows
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(-car.w/2+4,-car.h/2+8,car.w-8,car.h*0.3);
  ctx.fillRect(-car.w/2+4,car.h*0.1,car.w-8,car.h*0.15);
  // Headlights / taillights
  const lightCol=isPlayer?'#fff':'#ff2d78';
  ctx.fillStyle=lightCol;ctx.shadowColor=lightCol;ctx.shadowBlur=12;
  ctx.fillRect(-car.w/2+2,isPlayer?-car.h/2:-car.h/2+2,8,5);
  ctx.fillRect(car.w/2-10,isPlayer?-car.h/2:-car.h/2+2,8,5);
  ctx.restore();
}

function drawBoost(b){
  ctx.save();
  ctx.translate(b.x,b.y);
  ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);
  const g=ctx.createRadialGradient(0,0,2,0,0,b.r);
  g.addColorStop(0,'#fff');g.addColorStop(1,'rgba(255,165,2,0.3)');
  ctx.fillStyle=g;ctx.shadowColor='#ffa502';ctx.shadowBlur=20;
  ctx.fill();
  ctx.fillStyle='#080b14';ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('⚡',0,1);
  ctx.restore();
}

function rect(ax,ay,aw,ah,bx,by,bw,bh){
  return ax-aw/2<bx+bw/2 && ax+aw/2>bx-bw/2 && ay-ah/2<by+bh/2 && ay+ah/2>by-bh/2;
}

const keys={};
document.addEventListener('keydown',e=>keys[e.key]=true);
document.addEventListener('keyup',e=>keys[e.key]=false);

// Mobile buttons
document.getElementById('leftBtn').addEventListener('touchstart',e=>{e.preventDefault();keys['ArrowLeft']=true});
document.getElementById('leftBtn').addEventListener('touchend',()=>keys['ArrowLeft']=false);
document.getElementById('rightBtn').addEventListener('touchstart',e=>{e.preventDefault();keys['ArrowRight']=true});
document.getElementById('rightBtn').addEventListener('touchend',()=>keys['ArrowRight']=false);

function update(){
  frame++;
  // Input
  if((keys['ArrowLeft']||keys['a']||keys['A']) && player.x>LANE_W/2+4) player.x-=5;
  if((keys['ArrowRight']||keys['d']||keys['D']) && player.x<W-LANE_W/2-4) player.x+=5;

  // Speed ramp
  spd=baseSpeed+score/800;
  ui.speed.textContent=Math.floor(spd*30);
  ui.score.textContent=score;

  // Lines
  lines.forEach(l=>{l.y+=spd;if(l.y>H)l.y=-60;});

  // Cars
  if(frame%Math.max(40,80-Math.floor(score/200))===0) spawnCar();
  cars.forEach(c=>c.y+=spd*0.9);
  cars=cars.filter(c=>{
    if(c.y>H+80) return false;
    if(player.invincible<=0 && rect(player.x,player.y,player.w-6,player.h-6,c.x,c.y,c.w-4,c.h-4)){
      lives--;player.invincible=120;
      updateLives();
      if(lives<=0){endGame();return false;}
    }
    return true;
  });

  // Boosts
  if(frame%200===0) spawnBoost();
  boosts.forEach(b=>b.y+=spd);
  boosts=boosts.filter(b=>{
    if(b.y>H+30) return false;
    const dx=player.x-b.x,dy=player.y-b.y;
    if(Math.sqrt(dx*dx+dy*dy)<b.r+16){score+=100;spd+=0.5;return false;}
    return true;
  });

  if(player.invincible>0) player.invincible--;
  score++;
}

function updateLives(){
  ui.lives.textContent='❤'.repeat(lives)+'🖤'.repeat(3-lives);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawRoad();
  boosts.forEach(b=>drawBoost(b));
  cars.forEach(c=>drawCar(c,false));
  drawCar(player,true);
  // Speed lines effect
  if(spd>6){
    ctx.strokeStyle=`rgba(255,165,2,${(spd-6)*0.04})`;ctx.lineWidth=1;
    for(let i=0;i<8;i++){
      const x=Math.random()*W;
      ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+Math.random()*20-10,H);ctx.stroke();
    }
  }
}

function loop(){
  if(!gameRunning) return;
  update();draw();
  animId=requestAnimationFrame(loop);
}

function startGame(){
  score=0;lives=3;spd=baseSpeed;frame=0;player.x=W/2;player.y=H-120;player.invincible=0;
  cars=[];boosts=[];
  updateLives();
  overlay.style.display='none';
  gameRunning=true;
  loop();
}

function endGame(){
  gameRunning=false;
  cancelAnimationFrame(animId);
  oTitle.textContent='Game Over!';
  oMsg.textContent='Distance covered:';
  oMsg2.textContent='Better luck next time!';
  oScore.style.display='block';
  oScore.textContent=score.toLocaleString()+' m';
  startBtn.textContent='▶ Race Again';
  overlay.style.display='flex';
}

startBtn.addEventListener('click',startGame);
// Initial draw
drawRoad();
</script>
</body>
</html>
