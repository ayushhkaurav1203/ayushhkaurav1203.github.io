<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hex Puzzle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080b14;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;font-family:'Exo 2',monospace;padding:16px;overflow-x:hidden}
h2{font-size:1.2rem;letter-spacing:3px;text-transform:uppercase;color:#2ed573;text-shadow:0 0 15px rgba(46,213,115,0.5);margin-bottom:12px;font-weight:900}
.hud{display:flex;gap:20px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
.hud-box{background:#111827;border:1px solid #1e2d40;border-radius:8px;padding:8px 18px;text-align:center}
.lbl{font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;color:#8899aa}
.val{font-size:1.2rem;font-weight:700;color:#2ed573;font-family:monospace}
.val.cyan{color:#00f5ff}
.val.yellow{color:#ffe600}
#board{display:grid;gap:6px;margin:0 auto}
.cell{width:52px;height:52px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;border:2px solid transparent;transition:transform 0.12s,box-shadow 0.12s;position:relative}
.cell:hover{transform:scale(1.1)}
.cell.selected{border-color:#fff;box-shadow:0 0 16px rgba(255,255,255,0.6);transform:scale(1.12)}
.cell.matched{animation:pop 0.35s ease forwards}
@keyframes pop{0%{transform:scale(1.2)}50%{transform:scale(0.8);opacity:0.5}100%{transform:scale(0);opacity:0}}
.cell.fall{animation:fall-in 0.3s ease}
@keyframes fall-in{from{transform:translateY(-40px);opacity:0}to{transform:translateY(0);opacity:1}}
.cell.hint-flash{animation:hint 0.5s ease 2}
@keyframes hint{0%,100%{border-color:transparent}50%{border-color:#ffe600;box-shadow:0 0 14px rgba(255,230,0,0.6)}}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,11,20,0.92);z-index:10}
#overlay h2{font-size:2rem}
#overlay .fs{font-size:2.5rem;color:#ffe600;margin:10px 0;font-weight:700;font-family:monospace}
#overlay p{color:#8899aa;margin-bottom:6px;font-size:0.9rem}
#startBtn{margin-top:14px;padding:12px 30px;background:#2ed573;color:#080b14;border:none;border-radius:8px;font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:0.2s}
#startBtn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(46,213,115,0.5)}
#hintBtn{margin-top:10px;padding:8px 18px;background:transparent;border:1px solid #ffe600;color:#ffe600;border-radius:6px;font-size:0.8rem;font-weight:700;letter-spacing:1px;cursor:pointer;transition:0.2s}
#hintBtn:hover{background:rgba(255,230,0,0.1)}
</style>
</head>
<body>
<h2>⬡ Hex Puzzle</h2>
<div class="hud">
  <div class="hud-box"><div class="lbl">Score</div><div class="val" id="scoreEl">0</div></div>
  <div class="hud-box"><div class="lbl">Moves</div><div class="val yellow" id="movesEl">20</div></div>
  <div class="hud-box"><div class="lbl">Level</div><div class="val cyan" id="levelEl">1</div></div>
  <div class="hud-box"><div class="lbl">Target</div><div class="val" id="targetEl">500</div></div>
</div>
<div id="board"></div>
<button id="hintBtn" style="margin-top:12px;display:none">💡 Hint</button>

<div id="overlay">
  <h2 id="oTitle">Hex Puzzle</h2>
  <p id="oMsg">Match 3 or more tiles of the same color!</p>
  <p id="oMsg2" style="color:#2ed573;font-size:0.9rem">Click a tile then click an adjacent tile to swap.</p>
  <div class="fs" id="oScore" style="display:none"></div>
  <button id="startBtn">▶ Play</button>
</div>

<script>
const COLS=7,ROWS=7;
const GEMS=['🟥','🟦','🟩','🟨','🟪','🟧'];
const GEM_COLORS=['#ff4757','#2196f3','#2ed573','#ffe600','#a855f7','#ffa502'];
const board=document.getElementById('board');
const overlay=document.getElementById('overlay');
const startBtn=document.getElementById('startBtn');
const hintBtn=document.getElementById('hintBtn');
const oTitle=document.getElementById('oTitle');
const oMsg=document.getElementById('oMsg');
const oMsg2=document.getElementById('oMsg2');
const oScore=document.getElementById('oScore');
board.style.gridTemplateColumns=`repeat(${COLS},52px)`;

let grid=[],selected=null,score=0,moves=20,level=1,target=500,animating=false;

function randGem(){return Math.floor(Math.random()*GEMS.length)}

function initGrid(){
  grid=[];
  for(let r=0;r<ROWS;r++){
    grid[r]=[];
    for(let c=0;c<COLS;c++) grid[r][c]=randGem();
  }
  // Ensure no initial matches
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    let tries=0;
    while(checkMatchAt(r,c) && tries<10){grid[r][c]=randGem();tries++;}
  }
}

function checkMatchAt(r,c){
  const v=grid[r][c];
  // horizontal
  if(c>=2 && grid[r][c-1]===v && grid[r][c-2]===v) return true;
  // vertical
  if(r>=2 && grid[r-1][c]===v && grid[r-2][c]===v) return true;
  return false;
}

function renderBoard(){
  board.innerHTML='';
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const g=grid[r][c];
    const cell=document.createElement('div');
    cell.className='cell';
    cell.style.background=GEM_COLORS[g]+'22';
    cell.style.borderColor=GEM_COLORS[g]+'44';
    cell.textContent=GEMS[g];
    cell.dataset.r=r;cell.dataset.c=c;
    cell.addEventListener('click',()=>onCellClick(r,c));
    board.appendChild(cell);
  }
}

function getCell(r,c){return board.children[r*COLS+c]}

function onCellClick(r,c){
  if(animating) return;
  if(selected===null){selected={r,c};getCell(r,c).classList.add('selected');}
  else{
    const {r:sr,c:sc}=selected;
    getCell(sr,sc).classList.remove('selected');
    if(sr===r && sc===c){selected=null;return;}
    if(Math.abs(sr-r)+Math.abs(sc-c)===1){
      swap(sr,sc,r,c);
      moves--;
      document.getElementById('movesEl').textContent=moves;
      selected=null;
    } else {
      selected={r,c};getCell(r,c).classList.add('selected');
    }
  }
}

async function swap(r1,c1,r2,c2){
  animating=true;
  [grid[r1][c1],grid[r2][c2]]=[grid[r2][c2],grid[r1][c1]];
  renderBoard();
  const matches=findMatches();
  if(matches.length===0){
    // swap back
    [grid[r1][c1],grid[r2][c2]]=[grid[r2][c2],grid[r1][c1]];
    renderBoard();moves++;document.getElementById('movesEl').textContent=moves;
    animating=false;return;
  }
  await resolveMatches();
  animating=false;
  checkEndCondition();
}

function findMatches(){
  const matched=new Set();
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS-2;c++){
    if(grid[r][c]===grid[r][c+1] && grid[r][c]===grid[r][c+2])
      [0,1,2].forEach(i=>matched.add(`${r},${c+i}`));
  }
  for(let r=0;r<ROWS-2;r++) for(let c=0;c<COLS;c++){
    if(grid[r][c]===grid[r+1][c] && grid[r][c]===grid[r+2][c])
      [0,1,2].forEach(i=>matched.add(`${r+i},${c}`));
  }
  return [...matched].map(s=>{const[r,c]=s.split(',');return{r:+r,c:+c}});
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

async function resolveMatches(){
  let matches=findMatches();
  while(matches.length>0){
    const pts=matches.length*10;
    score+=pts;
    document.getElementById('scoreEl').textContent=score;
    // Flash matched
    matches.forEach(({r,c})=>{getCell(r,c).classList.add('matched')});
    await sleep(350);
    // Remove
    matches.forEach(({r,c})=>{grid[r][c]=-1});
    // Drop
    for(let c=0;c<COLS;c++){
      let empty=ROWS-1;
      for(let r=ROWS-1;r>=0;r--){
        if(grid[r][c]!==-1){grid[empty][c]=grid[r][c];if(empty!==r)grid[r][c]=-1;empty--;}
      }
      for(let r=empty;r>=0;r--) grid[r][c]=randGem();
    }
    renderBoard();
    // Animate fall
    board.querySelectorAll('.cell').forEach(c=>c.classList.add('fall'));
    await sleep(300);
    board.querySelectorAll('.cell').forEach(c=>c.classList.remove('fall'));
    matches=findMatches();
  }
}

function findHint(){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS-1;c++){
    [grid[r][c],grid[r][c+1]]=[grid[r][c+1],grid[r][c]];
    if(findMatches().length>0){[grid[r][c],grid[r][c+1]]=[grid[r][c+1],grid[r][c]];return{r1:r,c1:c,r2:r,c2:c+1};}
    [grid[r][c],grid[r][c+1]]=[grid[r][c+1],grid[r][c]];
  }
  for(let r=0;r<ROWS-1;r++) for(let c=0;c<COLS;c++){
    [grid[r][c],grid[r+1][c]]=[grid[r+1][c],grid[r][c]];
    if(findMatches().length>0){[grid[r][c],grid[r+1][c]]=[grid[r+1][c],grid[r][c]];return{r1:r,c1:c,r2:r+1,c2:c};}
    [grid[r][c],grid[r+1][c]]=[grid[r+1][c],grid[r][c]];
  }
  return null;
}

hintBtn.addEventListener('click',()=>{
  if(animating) return;
  const h=findHint();
  if(h){
    getCell(h.r1,h.c1).classList.add('hint-flash');
    getCell(h.r2,h.c2).classList.add('hint-flash');
    setTimeout(()=>{
      getCell(h.r1,h.c1).classList.remove('hint-flash');
      getCell(h.r2,h.c2).classList.remove('hint-flash');
    },1100);
  }
});

function checkEndCondition(){
  if(score>=target){
    level++;target+=700;moves+=15;
    document.getElementById('levelEl').textContent=level;
    document.getElementById('targetEl').textContent=target;
    document.getElementById('movesEl').textContent=moves;
    // Brief level-up flash
    document.body.style.background='#0a2010';
    setTimeout(()=>document.body.style.background='#080b14',400);
  } else if(moves<=0){
    oTitle.textContent='Out of Moves!';
    oMsg.textContent='Final score:';
    oMsg2.textContent=`You reached level ${level}`;
    oScore.style.display='block';
    oScore.textContent=score.toLocaleString();
    startBtn.textContent='▶ Play Again';
    overlay.style.display='flex';
    hintBtn.style.display='none';
  }
}

function startGame(){
  score=0;moves=20;level=1;target=500;
  document.getElementById('scoreEl').textContent='0';
  document.getElementById('movesEl').textContent='20';
  document.getElementById('levelEl').textContent='1';
  document.getElementById('targetEl').textContent='500';
  oScore.style.display='none';
  initGrid();renderBoard();
  overlay.style.display='none';
  hintBtn.style.display='block';
}

startBtn.addEventListener('click',startGame);
</script>
</body>
</html>
